<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asignaciones - GESTUEDU</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- IMPORTANTE: Esta es la librería que hace la magia de las animaciones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    :root {
      --azul-gestu: #0B5394;
      --naranja-gestu: #FF9900;
      --fondo-gestu: #F7FAEF;
    }

    body {
      background-color: var(--fondo-gestu);
      overflow-x: hidden; /* Evita scroll horizontal durante animaciones de entrada */
    }

    .text-azul { color: var(--azul-gestu) !important; }
    
    .btn-gestu {
      background-color: var(--azul-gestu) !important;
      color: white !important;
      border: none !important;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .btn-cerrar-sesion {
    color: #dc3545 !important;
    border: 2px solid #dc3545 !important;
    background-color: transparent !important;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: bold;
    transition: all 0.3s ease;
    text-decoration: none;
}

.btn-cerrar-sesion:hover {
    background-color: #dc3545 !important;
    color: white !important;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(220, 53, 69, 0.2);
}


    /* Tarjetas de formulario */
    .card-asignacion {
      background: white;
      border: none;
      border-radius: 15px;
      overflow: hidden;
      border-top: 5px solid var(--azul-gestu);
      transition: transform 0.3s ease;
    }

    /* Efecto de elevar la tarjeta al pasar el mouse */
    .card-asignacion:hover {
      transform: scale(1.02);
    }

    .card-naranja { border-top-color: var(--naranja-gestu); }

    .img-header-card {
      width: 100%;
      height: 100px;
      object-fit: cover;
    }

    /* Estilo de las tablas */
    .table-container {
      background: white;
      border-radius: 15px;
      padding: 20px;
      border-left: 5px solid var(--azul-gestu);
    }
  </style>
</head>

<body>

<header class="bg-white shadow-sm py-3 mb-4 sticky-top">
  <div class="container d-flex justify-content-between align-items-center">
    <!-- Logo -->
    <img src="img/logo.png" alt="Logo GESTUEDU" height="65" class="animate__animated animate__fadeInLeft">

    <nav class="d-none d-md-block">
      <a href="index.html" class="btn text-azul fw-bold">Inicio</a>
      <a href="modulos.html" class="btn text-azul">Módulos</a>
      <a href="conocenos.html" class="btn text-azul">Conócenos</a>
      <a href="contacto.html" class="btn text-azul">Contacto</a>
    </nav>

    <div id="userSection" class="animate__animated animate__fadeInRight">
      <!-- Se llena con JS -->
    </div>
  </div>
</header>

<div class="container pb-5">
  <!-- Título con rebote -->
  <h2 class="fw-bold text-azul mb-5 text-center animate__animated animate__bounceIn">
    Panel de Asignaciones Académicas
  </h2>

 <!-- Contenedor principal de los tres bloques (Sin animación en la fila para evitar conflictos) -->
<div class="row g-4 mt-2"> 
  
  <!-- Bloque 1: Estudiantes -->
  <div class="col-lg-4 col-md-6 animate__animated animate__fadeInLeft" style="animation-delay: 0.1s;">
    <div class="card-asignacion shadow-sm h-100">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=600&q=80" class="img-header-card" alt="Estudiantes">
      <div class="p-3">
        <h5 class="fw-bold text-azul">Asignar Estudiante</h5>
        <div class="input-group mb-2">
          <input id="buscar" class="form-control" placeholder="Nombre o DNI">
          <button class="btn btn-gestu" onclick="buscarEstudiantes()">🔍</button>
        </div>
        <select id="estudiante_id" class="form-select mb-2"><option value="">Seleccione estudiante</option></select>
        <select id="grupo_estudiante_id" class="form-select mb-3"><option value="">Seleccione grupo</option></select>
        <button class="btn btn-gestu w-100" onclick="asignarEstudiante()">Vincular</button>
      </div>
    </div>
  </div>

  <!-- Bloque 2: Materias -->
  <div class="col-lg-4 col-md-6 animate__animated animate__fadeInUp" style="animation-delay: 0.4s;">
    <div class="card-asignacion shadow-sm h-100 card-naranja">
      <img src="https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=400&q=80" class="img-header-card" alt="Materias">
      <div class="p-3">
        <h5 class="fw-bold" style="color: var(--naranja-gestu);">Asignar Materia</h5>
        <select id="grupo_materia_id" class="form-select mb-2"><option value="">Seleccione grupo</option></select>
        <select id="materia_grupo_id" class="form-select mb-3"><option value="">Seleccione materia</option></select>
        <button class="btn w-100 text-white fw-bold" style="background-color: var(--naranja-gestu); border: none;" onclick="asignarMateriaGrupo()">Vincular</button>
      </div>
    </div>
  </div>

  <!-- Bloque 3: Profesores -->
  <div class="col-lg-4 col-md-12 animate__animated animate__fadeInRight" style="animation-delay: 0.7s;">
    <div class="card-asignacion shadow-sm h-100">
      <img src="https://images.unsplash.com/photo-1544531585-9847b68c8c86?auto=format&fit=crop&w=400&q=80" class="img-header-card" alt="Profesores">
      <div class="p-3">
        <h5 class="fw-bold text-azul">Asignar Profesor</h5>
        <select id="profesor_id" class="form-select mb-2"><option value="">Seleccione profesor</option></select>
        <select id="grupo_profesor_id" class="form-select mb-2"><option value="">Seleccione grupo</option></select>
        <select id="materia_profesor_id" class="form-select mb-3"><option value="">Seleccione materia</option></select>
        <button class="btn btn-gestu w-100" onclick="asignarProfesorMateria()">Vincular</button>
      </div>
    </div>
  </div>

</div>

</div> <!-- Fin de la fila (row) -->

  <!-- Tabla con aparición suave -->
  <div class="mt-5 table-container shadow-sm animate__animated animate__zoomIn">
    <h4 class="fw-bold text-azul mb-4">Registros de Asignación</h4>
    <table class="table table-hover">
      <thead class="table-light">
        <tr><th>Tipo</th><th>Descripción</th><th>Acción</th></tr>
      </thead>
      <tbody>
        <tr class="animate__animated animate__fadeInLeft" style="animation-delay: 1s;">
          <td><span class="badge bg-primary">Estudiante</span></td>
          <td>Carlos Ruiz -> 11-B</td>
          <td><button class="btn btn-sm btn-outline-danger">Eliminar</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const token = localStorage.getItem("token");
  const userSection = document.getElementById("userSection");

  // Si hay token, mostramos "Cerrar Sesión" con contorno rojo
  if (token) {
    userSection.innerHTML = `
      <button onclick="logout()" class="btn btn-cerrar-sesion shadow-sm">Cerrar Sesión</button>
    `;
  } else {
    // Si no hay token, mostramos el botón azul normal de Iniciar Sesión
    userSection.innerHTML = `
      <a href="login.html" class="btn btn-gestu shadow-sm">Iniciar Sesión</a>
    `;
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
  }
</script>

</body>
</html>
