<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - GESTUEDU</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Animate -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>

:root{
  --azul-gestu:#0B5394;
  --naranja-gestu:#FF9900;
  --fondo-gestu:#F7FAEF;
}

body{
  background:var(--fondo-gestu);
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow-x:hidden;
  position:relative;
  padding:30px 15px;
}

/* FONDOS DECORATIVOS */
body::before{
  content:"";
  position:absolute;
  width:450px;
  height:450px;
  background:rgba(11,83,148,0.08);
  border-radius:50%;
  top:-180px;
  left:-120px;
}

body::after{
  content:"";
  position:absolute;
  width:350px;
  height:350px;
  background:rgba(255,153,0,0.08);
  border-radius:50%;
  bottom:-150px;
  right:-100px;
}

/* CARD */
.register-box{
  position:relative;
  z-index:2;

  width:100%;
  max-width:550px;

  background:white;
  border:none;
  border-radius:18px;
  overflow:hidden;

  box-shadow:0 8px 20px rgba(0,0,0,0.08);

  transition:all 0.3s ease;

  border-top:5px solid var(--azul-gestu);
}

/* HOVER */
.register-box:hover{
  transform:translateY(-5px) scale(1.01);
}

/* IMAGEN SUPERIOR */
.register-header img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* CONTENIDO */
.register-body{
  padding:35px;
}

/* LOGO */
.logo-gestu{
  height:70px;
  width:auto;
  display:block;
  margin:-70px auto 20px;

  background:white;
  padding:10px;
  border-radius:18px;

  box-shadow:0 8px 18px rgba(0,0,0,0.10);

  transition:0.3s;
}

.logo-gestu:hover{
  transform:scale(1.05);
}

/* TITULO */
.register-body h2{
  color:var(--azul-gestu);
  font-weight:700;
  text-align:center;
  margin-bottom:10px;
}

.subtexto{
  text-align:center;
  color:#777;
  margin-bottom:30px;
}

/* LABELS */
.form-label{
  font-weight:600;
  color:#444;
  margin-bottom:8px;
}

/* INPUTS */
.form-control,
.form-select{
  width:100%;
  height:50px;
  border-radius:12px;
  border:1px solid #ddd;
  padding:10px;
  outline:none;
  transition:0.3s;
}

textarea.form-control{
  height:auto;
}

.form-control:focus,
.form-select:focus{
  border-color:var(--azul-gestu);
  box-shadow:0 0 0 3px rgba(11,83,148,0.1);
}

/* BOTONES GENERALES */
button{
  border:none;
  padding:10px 18px;
  border-radius:10px;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
}

/* BOTON GESTU */
.btn-gestu{
  background:var(--azul-gestu);
  color:white;
  height:50px;
  border-radius:12px;
  font-weight:600;
  width:100%;
}

.btn-gestu:hover{
  background:#083d6d;
  color:white;
  box-shadow:0 8px 20px rgba(11,83,148,0.3);
}

/* BOTON CANCELAR */
.btn-cancelar{
  background:#dc3545;
  color:white;
  height:50px;
  border-radius:12px;
  font-weight:600;
  width:100%;
}

.btn-cancelar:hover{
  background:#bb2d3b;
  color:white;
}

/* FOOTER */
.footer-text{
  text-align:center;
  margin-top:25px;
  color:#666;
  font-size:14px;
}

/* RESPONSIVE */
@media(max-width:768px){

  .register-body{
    padding:25px;
  }

  .logo-gestu{
    height:60px;
  }

}

</style>
</head>

<body>

<div class="register-box animate__animated animate__fadeInUp">

<!-- IMAGEN -->
<div class="register-header">

  <img
    src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=80"
    alt="Registro GESTUEDU">

</div>

<!-- CONTENIDO -->
<div class="register-body">

  <!-- LOGO -->
  <img src="img/logo.png"
       alt="Logo GESTUEDU"
       class="logo-gestu animate__animated animate__fadeInDown">

  <h2>Registro de Usuario</h2>

  <p class="subtexto">
    Crea tu cuenta para acceder al sistema GESTUEDU
  </p>

  <form onsubmit="handleRegister(event)">

    <div class="row g-3 text-start">

      <!-- NOMBRE -->
      <div class="col-md-12">

        <label class="form-label">
          Nombre
        </label>

        <input type="text"
               id="nombre"
               class="form-control"
               placeholder="Nombre completo"
               required>

      </div>

      <!-- EMAIL -->
      <div class="col-md-12">

        <label class="form-label">
          Correo
        </label>

        <input type="email"
               id="email"
               class="form-control"
               placeholder="ejemplo@correo.com"
               required>

      </div>

      <!-- DNI -->
      <div class="col-md-6">

        <label class="form-label">
          DNI
        </label>

        <input type="text"
               id="dni"
               class="form-control"
               placeholder="Documento">

      </div>

      <!-- ROL -->
      <div class="col-md-6">

        <label class="form-label">
          Rol
        </label>

        <select id="rol"
                class="form-select">

          <option value="estudiante">
            Estudiante
          </option>

          <option value="profesor">
            Profesor
          </option>

          <option value="admin">
            Admin
          </option>

        </select>

      </div>

      <!-- PASSWORD -->
      <div class="col-md-12">

        <label class="form-label">
          Contraseña
        </label>

        <input type="password"
               id="password"
               class="form-control"
               placeholder="Mínimo 6 caracteres"
               required>

      </div>

      <!-- BOTON -->
      <div class="col-md-6">

        <button type="submit"
                class="btn btn-gestu w-100">

          Registrar

        </button>

      </div>

      <!-- CANCELAR -->
      <div class="col-md-6">

        <button type="button"
                onclick="volver()"
                class="btn btn-cancelar w-100">

          Cancelar

        </button>

      </div>

    </div>

  </form>

  <!-- FOOTER -->
  <div class="footer-text">
    © 2026 GESTUEDU — Proyecto SENA ADSO
  </div>

</div>
</div>

<script>

async function handleRegister(e) {

    e.preventDefault();

    const nombre = document.getElementById("nombre").value.trim();
    const email = document.getElementById("email").value.trim();
    const dni = document.getElementById("dni").value.trim();
    const password = document.getElementById("password").value;
    const rol = document.getElementById("rol").value;

    // VALIDACIONES
    if (!nombre || !email || !password) {

        alert("Todos los campos son obligatorios");
        return;
    }

    if (password.length < 6) {

        alert("La contraseña debe tener mínimo 6 caracteres");
        return;
    }

    try {

        const res = await fetch("http://localhost:3000/api/auth/register", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                nombre,
                email,
                password,
                rol,
                dni
            })

        });

        const data = await res.json();

        if (res.ok) {

            alert("Usuario registrado correctamente");

            window.location.href = "login.html";

        } else {

            alert(data.error || "Error en registro");

        }

    } catch (error) {

        console.error(error);

        alert("No se pudo conectar con el servidor");

    }
}

function volver() {
    window.location.href = "login.html";
}

</script>

</body>
</html>
