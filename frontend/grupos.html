<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Grupos - GESTUEDU</title>
<link rel="stylesheet" href="estilos.css">
</head>
<body>
<header>
  <img src="logo.png" height="40">
  <nav>
    <a href="modulos.html" class="btn-azul">Módulos</a>
    <a href="materias.html" class="btn-azul">Materias</a>
    <a href="asignaciones.html" class="btn-azul">Asignaciones</a>
    <a href="notas.html" class="btn-azul">Notas</a>
  </nav>
  <button onclick="logout()" class="btn-azul">Cerrar Sesión</button>
</header>

<div class="container">
  <h2>Gestión de Grupos</h2>
  <div class="medidor">
    <h3>Crear Grupo</h3>
    <input id="nombre" placeholder="Ej: Primer semestre">
    <input id="periodo" placeholder="Ej: 2026 - Semestre 1">
    <input id="seccion" placeholder="Ej: A">
    <button onclick="crear()">Crear</button>
  </div>

  <table width="100%">
    <thead>
      <tr><th>Nombre</th><th>Periodo</th><th>Sección</th><th>Acciones</th></tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>
const API = "http://localhost:3000/api/academico/grupos";
const token = localStorage.getItem("token");
if (!token) window.location.href = "login.html";

async function cargar() {
  const res = await fetch(API, { headers: { Authorization: "Bearer " + token } });
  const data = await res.json();
  tabla.innerHTML = "";
  data.forEach(g => {
    tabla.innerHTML += `
      <tr>
        <td><input id="n${g.id}" value="${g.nombre}"></td>
        <td><input id="p${g.id}" value="${g.periodo}"></td>
        <td><input id="s${g.id}" value="${g.seccion}"></td>
        <td>
          <button onclick="editar(${g.id})">Editar</button>
          <button onclick="eliminar(${g.id})">Eliminar</button>
        </td>
      </tr>`;
  });
}

async function crear() {
  const data = { nombre: nombre.value, periodo: periodo.value, seccion: seccion.value };
  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
    body: JSON.stringify(data)
  });
  const r = await res.json();
  if (res.ok) { alert("Grupo creado"); nombre.value = ""; periodo.value = ""; seccion.value = ""; cargar(); }
  else alert(r.error);
}

async function editar(id) {
  const data = {
    nombre: document.getElementById("n" + id).value,
    periodo: document.getElementById("p" + id).value,
    seccion: document.getElementById("s" + id).value
  };
  const res = await fetch(API + "/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
    body: JSON.stringify(data)
  });
  const r = await res.json();
  if (res.ok) { alert("Grupo actualizado"); cargar(); } else alert(r.error);
}

async function eliminar(id) {
  if (!confirm("¿Eliminar grupo?")) return;
  const res = await fetch(API + "/" + id, { method: "DELETE", headers: { Authorization: "Bearer " + token } });
  const r = await res.json();
  if (res.ok) { alert("Grupo eliminado"); cargar(); } else alert(r.error);
}

function logout() { localStorage.removeItem("token"); window.location.href = "login.html"; }
cargar();
</script>
</body>
</html>
