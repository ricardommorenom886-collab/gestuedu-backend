<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GestuEdu</title>
</head>
<body>

  <h1>Gestión de Estudiantes</h1>

  <!-- 🟢 FORMULARIO -->
  <h2>Registrar Estudiante</h2>
  <input type="text" id="nombre" placeholder="Nombre">
  <input type="email" id="correo" placeholder="Correo">
  <input type="number" id="edad" placeholder="Edad">
  <button id="btnGuardar">Guardar</button>

  <!-- 🔵 LISTA -->
  <h2>Lista de Estudiantes</h2>
  <ul id="lista"></ul>

  <script>
    // 🔥 API CORRECTA
    let editandoId = null;

  const API = "http://localhost:3000/api/estudiantes";

    // 🔵 OBTENER ESTUDIANTES
    async function obtenerEstudiantes() {
      const res = await fetch(API);
      const data = await res.json();

      console.log("Estudiantes:", data);

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      data.forEach(est => {
        const li = document.createElement("li");
        li.innerHTML = `
          ${est.nombre} - ${est.correo} - ${est.edad}
          <button onclick="eliminarEstudiante(${est.id})">Eliminar</button>
        `;
        lista.appendChild(li);
      });
    }

    async function crearEstudiante() {
  const nombre = document.getElementById("nombre").value;
  const correo = document.getElementById("correo").value;
  const edad = document.getElementById("edad").value;

  let url = API;
  let method = "POST";

  if (editandoId) {
    url = `${API}/${editandoId}`;
    method = "PUT";
  }

  try {
    const res = await fetch(url, {
      method: method,
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ nombre, correo, edad })
    });

    const data = await res.json();

    console.log("RESPUESTA BACKEND:", data);

    // 🔴 SI HAY ERROR → NO LIMPIAR
    if (!res.ok) {
      alert("Error: " + data.message);
      return;
    }

    // ✅ SOLO LIMPIAR SI TODO SALE BIEN
    document.getElementById("nombre").value = "";
    document.getElementById("correo").value = "";
    document.getElementById("edad").value = "";

    editandoId = null;

    obtenerEstudiantes();

  } catch (error) {
    console.error("ERROR:", error);
    alert("Error de conexión con el servidor");
  }
}

    // 🔴 ELIMINAR
    async function eliminarEstudiante(id) {
      await fetch(`${API}/${id}`, {
        method: "DELETE"
      });

      obtenerEstudiantes();
    }

    // 🔥 BOTÓN CONECTADO BIEN
    document.getElementById("btnGuardar").addEventListener("click", crearEstudiante);

    // 🚀 CARGA INICIAL
    obtenerEstudiantes();
  </script>

</body>
</html>
